name: Labeler

on:
  pull_request_target:
    types: [ opened, reopened, synchronize, edited ]
    branches: [ main, dev ]
  pull_request:
    types: [ opened, reopened, synchronize, edited ]
    branches: [ main, dev ]

  issues:
    types: [ opened, edited ]
  issue_comment:
    types: [ created, edited ]

permissions:
  contents: read
  statuses: write
  issues: write
  checks: write
  pull-requests: write

jobs:
  label-pull-request:
    name: Labeler
    runs-on: ubuntu-latest
    steps:
      - uses: fuxingloh/multi-labeler@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config-path: .github/labeler.yml