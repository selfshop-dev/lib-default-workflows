name: Labeler

on:
  workflow_call:

permissions:
  contents: read
  statuses: write
  issues: write
  checks: write
  pull-requests: write

jobs:
  label-pull-request:
    name: Labeler
    runs-on: ubuntu-latest
    steps:
      - uses: fuxingloh/multi-labeler@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config-path: .github/labeler.yml